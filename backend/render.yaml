services:
  - type: web
    name: propvision-ai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 10080
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: USE_LOCAL_STORAGE
        value: true
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: FRAMES_DIR
        value: /tmp/frames
      - key: REPORTS_DIR
        value: /tmp/reports
      - key: EVIDENCE_DIR
        value: /tmp/evidence
      - key: YOLO_MODEL_PATH
        value: yolo11x.pt
      - key: YOLO_CONFIDENCE_THRESHOLD
        value: 0.35
      - key: YOLO_IOU_THRESHOLD
        value: 0.45
      - key: YOLO_DEVICE
        value: cpu
      - key: USE_QWEN_API
        value: false
      - key: FRAME_INTERVAL_SECONDS
        value: 2.0
      - key: MAX_FRAMES_PER_VIDEO
        value: 150
      - key: BATCH_SIZE
        value: 4

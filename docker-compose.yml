version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: propinspect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Note: The backend API and Celery worker can be run via docker as well,
  # but during development they are typically run locally.
  # We provide definitions here if you want to containerize everything.
  #
  # backend:
  #   build: ./backend
  #   command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     - db
  #     - redis
  #
  # celery_worker:
  #   build: ./backend
  #   command: celery -A app.services.pipeline.celery_app worker --loglevel=info
  #   depends_on:
  #     - db
  #     - redis

volumes:
  postgres_data:
  redis_data:
